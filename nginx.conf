# ============================================
# Kaven's Blog — Nginx Configuration
# Reverse proxy to Astro SSR (standalone mode)
# ============================================
upstream blog_app {
    server app:4321;
}

server {
    listen 80;
    server_name _;

    # Client max body size (for image uploads)
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml text/html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Uploaded images (shared volume, Nginx direct serve) ──
    location /uploads/ {
        alias /data/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Proxy all other requests to Astro SSR ──
    # Astro handles: SSR pages, API routes, static assets (image/, JS, CSS, fonts)
    location / {
        proxy_pass http://blog_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
