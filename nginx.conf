# ============================================
# Kaven's Blog — Nginx Configuration
# ============================================
upstream blog_app {
    server app:3000;
}

server {
    listen 80;
    server_name _;

    # Client max body size (for image uploads)
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml text/html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static files (served directly by Nginx) ──
    location /css/ {
        alias /usr/share/nginx/html/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        alias /usr/share/nginx/html/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /image/ {
        alias /usr/share/nginx/html/image/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Uploaded images ──
    location /uploads/ {
        alias /data/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── API proxy to Node.js ──
    location /api/ {
        proxy_pass http://blog_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Main page (index.html) ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
