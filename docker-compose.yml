# ============================================
# Kaven's Blog — Docker Compose
# 一键部署: docker compose up -d
# ============================================
services:
  # ── Node.js App ────────────────────────────
  app:
    build: .
    container_name: blog-app
    restart: unless-stopped
    environment:
      - PORT=3000
      - NO_STATIC=true
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - TZ=Asia/Shanghai
    volumes:
      # Persistent database file
      - blog-data:/app
      # Shared uploads volume (also used by Nginx)
      - blog-uploads:/app/uploads
    networks:
      - blog-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: blog-nginx
    restart: unless-stopped
    ports:
      - "${PORT_EXPOSE:-80}:80"
    volumes:
      # Nginx config
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Static files (read-only)
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./image:/usr/share/nginx/html/image:ro
      # Uploaded images (shared with app)
      - blog-uploads:/data/uploads:ro
    networks:
      - blog-net
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  # Database persists here
  blog-data:
  # Uploaded images shared between app and nginx
  blog-uploads:

networks:
  blog-net:
    driver: bridge
