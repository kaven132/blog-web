# ============================================
# Kaven's Blog — Docker Compose
# Astro SSR + Nginx + SQLite backup
# 一键部署: docker compose up -d --build
# ============================================
services:
  # ── Astro SSR App ───────────────────────────
  app:
    build: .
    container_name: blog-app
    restart: unless-stopped
    environment:
      - PORT=4321
      - HOST=0.0.0.0
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - TZ=Asia/Shanghai
    volumes:
      # Persistent database file
      - blog-data:/app
      # Shared uploads volume (also used by Nginx)
      - blog-uploads:/app/uploads
    networks:
      - blog-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4321/api/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: blog-nginx
    restart: unless-stopped
    ports:
      - "${PORT_EXPOSE:-80}:80"
    volumes:
      # Nginx config
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uploaded images (shared with app)
      - blog-uploads:/data/uploads:ro
    networks:
      - blog-net
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Database Backup (daily) ────────────────
  backup:
    image: alpine:latest
    container_name: blog-backup
    restart: unless-stopped
    volumes:
      - blog-data:/data:ro
      - ./backups:/backups
    environment:
      - TZ=Asia/Shanghai
    entrypoint: |
      sh -c '
        while true; do
          sleep 86400
          cp /data/data.db /backups/data_$$(date +%Y%m%d_%H%M%S).db 2>/dev/null || true
          # Keep only latest 30 backups
          ls -t /backups/data_*.db 2>/dev/null | tail -n +31 | xargs rm -f 2>/dev/null || true
        done
      '
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

volumes:
  blog-data:
  blog-uploads:

networks:
  blog-net:
    driver: bridge
